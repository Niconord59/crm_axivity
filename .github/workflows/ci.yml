name: CI

on:
  pull_request:
    branches: [main, develop]
    paths: ['crm/**']

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: crm/package-lock.json

      - name: Install dependencies
        working-directory: crm
        run: npm ci

      - name: Lint
        working-directory: crm
        run: npm run lint || true  # Non-blocking until existing errors are fixed

      # PRO-TRX-1 — hard gate on react-hooks/set-state-in-effect for the
      # prospection module. This anti-pattern has been reintroduced 3 times
      # (H5/H7/H8 + hotfix 8e1405f7), so we fail CI on any future regression
      # in prospection paths. Scoped via eslint.prospection-gate.config.mjs
      # so it does NOT depend on fixing the 85 pre-existing lint errors in
      # other modules.
      - name: Lint (prospection set-state-in-effect gate)
        working-directory: crm
        run: npm run lint:prospection-gate

      - name: Test
        working-directory: crm
        run: npm test -- --run

      - name: Build
        working-directory: crm
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: fake-key-for-build
